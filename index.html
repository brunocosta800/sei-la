<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WILD CROSSING | Sobrevivência Animal</title>
    <meta name="description"
        content="Atravesse a rodovia com animais selvagens. Um clássico reimagined com elementos de RPG.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Space+Grotesk:wght@300;500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="game-container">
        <div id="ui-overlay">
            <h1 id="game-title">WILD CROSSING</h1>

            <div id="hud">
                <div id="score-container">DISTÂNCIA: <span id="dist-val">0m</span></div>
                <div id="animal-stats">
                    <span id="animal-name">---</span>
                </div>
            </div>

            <div id="main-menu">
                <p>O TRÂNSITO É IMPLACÁVEL</p>
                <div id="animal-preview" class="glass">
                    <div id="preview-sprite"></div>
                    <h3 id="preview-name">ESCOLHENDO ANIMAL...</h3>
                    <p id="preview-desc"></p>
                </div>
                <button id="start-btn">INICIAR TRAVESSIA</button>
            </div>

            <div id="game-over" class="hidden">
                <h2>ATROPELADO!</h2>
                <p>Você percorreu: <span id="final-score">0</span> metros</p>
                <button id="restart-btn">TENTAR NOVAMENTE</button>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>
    <script src="game.js"></script>
</body>

</html>
